openapi: 3.0.3
info:
  title: SubLedger API
  version: 0.0.1
servers:
  - url: http://localhost:3000
paths:
  /auth/signup:
    post:
      summary: Sign up
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created
  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
  /subscriptions/profile:
    get:
      summary: Get profile
      tags: [Subscriptions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile returned
        '401':
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SignupRequest:
      type: object
      required: [email, password, role, username]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [user, admin]
        username:
          type: string
          minLength: 6
          maxLength: 50
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
